<!-- Declaração do tipo de documento HTML5 -->
<!DOCTYPE html>
<!-- A classe 'light' define o tema claro como padrão ao carregar a página -->
<html lang="pt-BR" class="light">
<head>
    <!-- Configurações básicas de codificação e responsividade -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Fabiano Santos</title>
    
    <!-- Importação do Tailwind CSS via CDN para estilização com classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importação da fonte tipográfica 'Inter' do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Importação dos ícones do FontAwesome (ex: fa-arrow-left, fa-download) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!-- Arquivo CSS externo com variáveis de cor e animações base -->
    <link rel="stylesheet" href="/style.css">
</head>
<!-- CORPO DA PÁGINA: As classes cuidam da cor de fundo e do texto base, alterando suavemente (transition-colors) se o tema mudar -->
<body class="bg-background text-text-primary transition-colors duration-300">

    <!-- Elemento Canvas: Fica vazio no HTML. O arquivo 'script.js' usa ele para desenhar as partículas do fundo -->
    <canvas id="particle-canvas"></canvas>

    <!-- CABEÇALHO (HEADER): Usa 'sticky top-0' para grudar no topo da tela enquanto o usuário rola a página para baixo -->
    <header class="bg-card shadow-sm sticky top-0 z-40 transition-colors duration-300">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <!-- LOGO: Redireciona de volta para a página inicial (index.html) -->
            <a href="index.html" class="text-2xl font-bold text-text-heading tracking-tight hover:opacity-80 transition">
                Fabiano Santos
            </a>
            
            <div class="flex items-center gap-6">
                <!-- BOTÃO DE VOLTAR: Fica visível apenas em telas médias ou maiores (hidden md:flex) -->
                <a href="index.html" class="hidden md:flex items-center gap-2 font-medium text-blue-600 hover:text-blue-800 transition">
                    <i class="fa fa-arrow-left"></i> Voltar ao Início
                </a>

                <!-- BOTÃO DE TEMA: Alterna entre claro e escuro. Os ícones SVG (sol/lua) são controlados pelo 'script.js' -->
                <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-background-hover transition">
                    <svg id="theme-icon-moon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="theme-icon-sun" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
            </div>
        </nav>
    </header>

    <!-- CONTEÚDO PRINCIPAL: Ocupa no mínimo a altura total da tela (min-h-screen) -->
    <main class="container mx-auto px-6 py-16 relative z-10 min-h-screen">
        
        <!-- TÍTULO DA PÁGINA E DESCRIÇÃO -->
        <div class="text-center mb-16 scroll-animate">
            <h1 class="text-4xl md:text-5xl font-black text-text-heading mb-4">Meus Projetos</h1>
            <p class="text-xl text-text-secondary max-w-2xl mx-auto">
                Uma coleção completa das minhas soluções em desenvolvimento mobile, desktop e automação.
                Aqui você pode ver os detalhes, acessar o código e baixar os executáveis.
            </p>
        </div>

        <!-- CONTÊINER DE PROJETOS (MUITO IMPORTANTE!) -->
        <!-- 
             Nota para Dev: Este contêiner está vazio de propósito. 
             Os cards dos projetos não são escritos aqui no HTML. 
             Eles são gerados e injetados dinamicamente pelo arquivo 'projetos.js'.
             Se quiser adicionar, editar ou remover um projeto, abra o 'projetos.js' e altere a lista 'projetosData'.
        -->
        <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    </main>

    <!-- RODAPÉ -->
    <footer class="bg-slate-900 text-white mt-12 relative z-10">
        <div class="container mx-auto px-6 py-8 text-center">
            <!-- Atualize o ano aqui quando necessário -->
            <p>&copy; 2025 Fabiano da Costa Santos. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- SCRIPTS IMPORTANTES -->
    <!-- script.js: Controla o tema claro/escuro e as partículas do fundo -->
    <script src="script.js"></script>
    <!-- projetos.js: Lê os dados dos seus projetos e cria o visual (cards) dentro do '#projects-container' -->
    <script src="projetos.js"></script>
</body>
</html>
